trigger:
  branches:
    include:
      - dev
  paths:
    include:
      - src/Storefront/*   # only runs when Storefront changes

pool:
  vmImage: 'ubuntu-latest'

variables:
  buildConfiguration: 'Release'

stages:

# =========================
# BUILD STAGE (CI)
# =========================
- stage: Build
  displayName: Build + Unit Tests + Package
  jobs:
  - job: BuildJob
    displayName: Build Storefront Service

    steps:

    - task: UseDotNet@2
      inputs:
        packageType: 'sdk'
        version: '8.x'
      displayName: Install .NET SDK

    - script: dotnet restore src/Storefront/Storefront.csproj
      displayName: Restore dependencies

    - script: dotnet build src/Storefront/Storefront.csproj --configuration $(buildConfiguration) --no-restore
      displayName: Build project

    - script: dotnet test src/Storefront/Storefront.csproj --configuration $(buildConfiguration) --no-build
      displayName: Run unit tests

    - script: |
        dotnet publish src/Storefront/Storefront.csproj \
          -c $(buildConfiguration) \
          -o $(Build.ArtifactStagingDirectory)/Storefront
      displayName: Publish application

    - task: ArchiveFiles@2
      inputs:
        rootFolderOrFile: '$(Build.ArtifactStagingDirectory)/Storefront'
        includeRootFolder: false
        archiveType: zip
        archiveFile: '$(Build.ArtifactStagingDirectory)/Storefront.zip'
      displayName: Zip artifact

    - task: PublishBuildArtifacts@1
      inputs:
        pathToPublish: '$(Build.ArtifactStagingDirectory)/Storefront.zip'
        artifactName: 'drop'
      displayName: Publish artifact


# =========================
# INFRA - DEV
# =========================
- stage: Infra_Dev
  displayName: Deploy Infrastructure (DEV)
  dependsOn: Build

  jobs:
  - job: DeployInfraDev
    steps:

    - task: AzureCLI@2
      displayName: Deploy DEV Infrastructure (Bicep)
      inputs:
        azureSubscription: 'AZURE-SERVICE-CONNECTION'
        scriptType: bash
        scriptLocation: inlineScript
        inlineScript: |
          az deployment group create \
            --resource-group minieshop-dev-rg \
            --template-file src/Storefront/infra/bicep/storefront.bicep \
            --parameters @src/Storefront/infra/bicep/dev.parameters.json


# =========================
# DEV DEPLOYMENT
# =========================
- stage: Dev
  displayName: Deploy to DEV
  dependsOn: Infra_Dev

  jobs:
  - deployment: DeployDev
    environment: 'storefront-dev'
    pool:
      vmImage: 'ubuntu-latest'

    strategy:
      runOnce:
        deploy:
          steps:

          - download: current
            artifact: drop

          - task: AzureCLI@2
            displayName: Deploy to Dev
            inputs:
              azureSubscription: 'AZURE-SERVICE-CONNECTION'
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                az webapp deploy \
                  --name minieshop-storefront-dev \
                  --resource-group minieshop-dev-rg \
                  --src-path $(Pipeline.Workspace)/drop/Storefront.zip \
                  --type zip

          - script: |
              echo "Running integration tests..."
            displayName: Integration tests


# =========================
# INFRA - STAGING
# =========================
- stage: Infra_Staging
  displayName: Deploy Infrastructure (STAGING)
  dependsOn: Dev

  jobs:
  - job: DeployInfraStaging
    steps:

    - task: AzureCLI@2
      displayName: Deploy STAGING Infrastructure (Bicep)
      inputs:
        azureSubscription: 'AZURE-SERVICE-CONNECTION'
        scriptType: bash
        scriptLocation: inlineScript
        inlineScript: |
          az deployment group create \
            --resource-group minieshop-staging-rg \
            --template-file src/Storefront/infra/bicep/storefront.bicep \
            --parameters @src/Storefront/infra/bicep/staging.parameters.json


# =========================
# STAGING DEPLOYMENT
# =========================
- stage: Staging
  displayName: Deploy to STAGING
  dependsOn: Infra_Staging

  jobs:
  - deployment: DeployStaging
    environment: 'storefront-staging'
    pool:
      vmImage: 'ubuntu-latest'

    strategy:
      runOnce:
        deploy:
          steps:

          - download: current
            artifact: drop

          - task: AzureCLI@2
            displayName: Deploy to Staging
            inputs:
              azureSubscription: 'AZURE-SERVICE-CONNECTION'
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                az webapp deploy \
                  --name minieshop-storefront-staging \
                  --resource-group minieshop-staging-rg \
                  --src-path $(Pipeline.Workspace)/drop/Storefront.zip \
                  --type zip

          - script: |
              echo "Smoke test: checking service health"
              curl -f https://minieshop-storefront-staging.azurewebsites.net/health
            displayName: Smoke test


# =========================
# INFRA - PRODUCTION
# =========================
- stage: Infra_Production
  displayName: Deploy Infrastructure (PRODUCTION)
  dependsOn: Staging

  jobs:
  - job: DeployInfraProd
    steps:

    - task: AzureCLI@2
      displayName: Deploy PRODUCTION Infrastructure (Bicep)
      inputs:
        azureSubscription: 'AZURE-SERVICE-CONNECTION'
        scriptType: bash
        scriptLocation: inlineScript
        inlineScript: |
          az deployment group create \
            --resource-group minieshop-prod-rg \
            --template-file src/Storefront/infra/bicep/storefront.bicep \
            --parameters @src/Storefront/infra/bicep/prod.parameters.json


# =========================
# PRODUCTION DEPLOYMENT
# =========================
- stage: Production
  displayName: Deploy to PRODUCTION
  dependsOn: Infra_Production

  jobs:
  - deployment: DeployProd
    environment: 'storefront-prod'
    pool:
      vmImage: 'ubuntu-latest'

    strategy:
      runOnce:
        deploy:
          steps:

          - download: current
            artifact: drop

          - task: AzureCLI@2
            displayName: Deploy to Production
            inputs:
              azureSubscription: 'AZURE-SERVICE-CONNECTION'
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                az webapp deploy \
                  --name minieshop-storefront-prod \
                  --resource-group minieshop-prod-rg \
                  --src-path $(Pipeline.Workspace)/drop/Storefront.zip \
                  --type zip