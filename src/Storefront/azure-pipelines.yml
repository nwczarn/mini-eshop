trigger:
  branches:
    include:
      - dev
  paths:
    include:
      - src/Storefront/*   # only runs when Storefront changes

pool:
  vmImage: 'ubuntu-latest'

variables:
  buildConfiguration: 'Release'

stages:

# =========================
# BUILD STAGE (CI)
# =========================
- stage: Build
  displayName: Build + Unit Tests + Package
  jobs:
  - job: BuildJob
    displayName: Build Storefront Service

    steps:

    # -----------------------------------
    # Install .NET SDK (required for build)
    # -----------------------------------
    - task: UseDotNet@2
      inputs:
        packageType: 'sdk'
        version: '8.x'
      displayName: Install .NET SDK

    # -----------------------------------
    # Restore dependencies (Storefront only)
    # -----------------------------------
    - script: dotnet restore src/Storefront/Storefront.csproj
      displayName: Restore dependencies

    # -----------------------------------
    # Build Storefront project only
    # -----------------------------------
    - script: dotnet build src/Storefront/Storefront.csproj --configuration $(buildConfiguration) --no-restore
      displayName: Build project

    # -----------------------------------
    # Run unit tests (assumed to exist)
    # -----------------------------------
    - script: dotnet test src/Storefront/Storefront.csproj --configuration $(buildConfiguration) --no-build
      displayName: Run unit tests

    # -----------------------------------
    # Publish compiled output to folder
    # -----------------------------------
    - script: |
        dotnet publish src/Storefront/Storefront.csproj \
          -c $(buildConfiguration) \
          -o $(Build.ArtifactStagingDirectory)/Storefront
      displayName: Publish application

    # -----------------------------------
    # Zip published output
    # -----------------------------------
    - task: ArchiveFiles@2
      inputs:
        rootFolderOrFile: '$(Build.ArtifactStagingDirectory)/Storefront'
        includeRootFolder: false
        archiveType: zip
        archiveFile: '$(Build.ArtifactStagingDirectory)/Storefront.zip'
      displayName: Zip artifact

    # -----------------------------------
    # Publish artifact for later stages
    # -----------------------------------
    - task: PublishBuildArtifacts@1
      inputs:
        pathToPublish: '$(Build.ArtifactStagingDirectory)/Storefront.zip'
        artifactName: 'drop'
      displayName: Publish artifact


# =========================
# DEV DEPLOYMENT
# =========================
- stage: Dev
  displayName: Deploy to DEV
  dependsOn: Build

  jobs:
  - deployment: DeployDev
    environment: 'storefront-dev'   # configure approvals if needed
    pool:
      vmImage: 'ubuntu-latest'

    strategy:
      runOnce:
        deploy:
          steps:

          # -----------------------------------
          # Download build artifact
          # -----------------------------------
          - download: current
            artifact: drop

          # -----------------------------------
          # Extract artifact
          # -----------------------------------
          - script: |
              unzip $(Pipeline.Workspace)/drop/Storefront.zip -d app
            displayName: Extract artifact

          # -----------------------------------
          # Deploy using Azure CLI
          # -----------------------------------
          - task: AzureCLI@2
            displayName: Deploy to Dev
            inputs:
              azureSubscription: 'AZURE-SERVICE-CONNECTION'
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                az webapp deploy \
                  --name minieshop-storefront-dev \
                  --resource-group minieshop-dev-rg \
                  --src-path app

          # -----------------------------------
          # Integration tests (after deploy)
          # -----------------------------------
          - script: |
              echo "Running integration tests..."
              # Replace with real tests later:
              # dotnet test tests/IntegrationTests
            displayName: Integration tests


# =========================
# STAGING DEPLOYMENT (APPROVAL RECOMMENDED)
# =========================
- stage: Staging
  displayName: Deploy to STAGING
  dependsOn: Dev

  jobs:
  - deployment: DeployStaging
    environment: 'storefront-staging'   # add approval in Azure DevOps UI
    pool:
      vmImage: 'ubuntu-latest'

    strategy:
      runOnce:
        deploy:
          steps:

          # -----------------------------------
          # Download artifact
          # -----------------------------------
          - download: current
            artifact: drop

          # -----------------------------------
          # Extract artifact
          # -----------------------------------
          - script: |
              unzip $(Pipeline.Workspace)/drop/Storefront.zip -d app
            displayName: Extract artifact

          # -----------------------------------
          # Deploy to staging
          # -----------------------------------
          - task: AzureCLI@2
            displayName: Deploy to Staging
            inputs:
              azureSubscription: 'AZURE-SERVICE-CONNECTION'
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                az webapp deploy \
                  --name minieshop-storefront-staging \
                  --resource-group minieshop-staging-rg \
                  --src-path app

          # -----------------------------------
          # Smoke test (basic health check)
          # -----------------------------------
          - script: |
              echo "Smoke test: checking service health"
              curl -f https://storefront-staging.azurewebsites.net/health
            displayName: Smoke test


# =========================
# PRODUCTION DEPLOYMENT (MANUAL APPROVAL REQUIRED)
# =========================
- stage: Production
  displayName: Deploy to PRODUCTION
  dependsOn: Staging

  jobs:
  - deployment: DeployProd
    environment: 'storefront-prod'   # MUST configure approval in Azure DevOps UI
    pool:
      vmImage: 'ubuntu-latest'

    strategy:
      runOnce:
        deploy:
          steps:

          # -----------------------------------
          # Download artifact
          # -----------------------------------
          - download: current
            artifact: drop

          # -----------------------------------
          # Extract artifact
          # -----------------------------------
          - script: |
              unzip $(Pipeline.Workspace)/drop/Storefront.zip -d app
            displayName: Extract artifact

          # -----------------------------------
          # Deploy to production
          # -----------------------------------
          - task: AzureCLI@2
            displayName: Deploy to Production
            inputs:
              azureSubscription: 'AZURE-SERVICE-CONNECTION'
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                az webapp deploy \
                  --name minieshop-storefront-prod \
                  --resource-group minieshop-prod-rg \
                  --src-path app