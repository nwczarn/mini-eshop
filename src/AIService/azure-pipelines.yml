trigger:
  branches:
    include:
      - dev
  paths:
    include:
      - src/AIService/*   # only run when AIService changes

pool:
  vmImage: 'ubuntu-latest'

variables:
  buildConfiguration: 'Release'

stages:

# =========================
# BUILD STAGE
# =========================
- stage: Build
  displayName: Build + Unit Tests + Publish
  jobs:
  - job: BuildJob
    displayName: Build AIService service

    steps:

    # Install .NET SDK
    - task: UseDotNet@2
      inputs:
        packageType: 'sdk'
        version: '8.x'
      displayName: Install .NET SDK

    # Restore dependencies
    - script: dotnet restore
      displayName: Restore dependencies

    # Build project
    - script: dotnet build --configuration $(buildConfiguration)
      displayName: Compile project

    # Unit tests (assumed to exist)
    - script: dotnet test --configuration $(buildConfiguration)
      displayName: Run unit tests

    # Publish application
    - script: dotnet publish -c $(buildConfiguration) -o $(Build.ArtifactStagingDirectory)
      displayName: Publish app

    # Zip artifact
    - task: ArchiveFiles@2
      inputs:
        rootFolderOrFile: '$(Build.ArtifactStagingDirectory)'
        includeRootFolder: false
        archiveType: zip
        archiveFile: '$(Build.ArtifactStagingDirectory)/aiservice.zip'
      displayName: Zip artifact

    # Publish artifact
    - task: PublishBuildArtifacts@1
      inputs:
        pathToPublish: '$(Build.ArtifactStagingDirectory)/aiservice.zip'
        artifactName: 'drop'
      displayName: Publish artifact


# =========================
# DEV DEPLOYMENT
# =========================
- stage: Dev
  displayName: Deploy to DEV
  dependsOn: Build

  jobs:
  - deployment: DeployDev
    environment: 'aiservice-dev'   # add approvals if needed
    pool:
      vmImage: 'ubuntu-latest'

    strategy:
      runOnce:
        deploy:
          steps:

          # Download artifact
          - download: current
            artifact: drop

          # Deploy using Azure CLI (no task dependency issues)
          - task: AzureCLI@2
            displayName: Deploy to Dev
            inputs:
              azureSubscription: 'AZURE-SERVICE-CONNECTION'
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                unzip $(Pipeline.Workspace)/drop/aiservice.zip -d app
                az webapp deploy \
                  --name aiservice-dev \
                  --resource-group <YOUR-RG> \
                  --src-path app

          # Integration tests (after deploy)
          - script: |
              echo "Running integration tests..."
              # dotnet test IntegrationTests
            displayName: Integration tests


# =========================
# STAGING
# =========================
- stage: Staging
  displayName: Deploy to STAGING
  dependsOn: Dev

  jobs:
  - deployment: DeployStaging
    environment: 'aiservice-staging'  # approval recommended
    pool:
      vmImage: 'ubuntu-latest'

    strategy:
      runOnce:
        deploy:
          steps:

          - download: current
            artifact: drop

          - task: AzureCLI@2
            displayName: Deploy to Staging
            inputs:
              azureSubscription: 'AZURE-SERVICE-CONNECTION'
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                unzip $(Pipeline.Workspace)/drop/aiservice.zip -d app
                az webapp deploy \
                  --name aiservice-staging \
                  --resource-group <YOUR-RG> \
                  --src-path app

          # Smoke test (basic health check)
          - script: |
              echo "Smoke test: checking service health"
              curl -f https://aiservice-staging.azurewebsites.net/health
            displayName: Smoke test


# =========================
# PRODUCTION
# =========================
- stage: Production
  displayName: Deploy to PRODUCTION
  dependsOn: Staging

  jobs:
  - deployment: DeployProd
    environment: 'aiservice-prod'  # MUST have approval in Azure UI
    pool:
      vmImage: 'ubuntu-latest'

    strategy:
      runOnce:
        deploy:
          steps:

          - download: current
            artifact: drop

          - task: AzureCLI@2
            displayName: Deploy to Production
            inputs:
              azureSubscription: 'AZURE-SERVICE-CONNECTION'
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                unzip $(Pipeline.Workspace)/drop/aiservice.zip -d app
                az webapp deploy \
                  --name aiservice-prod \
                  --resource-group <YOUR-RG> \
                  --src-path app